<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0b7caa"/>
  
  <!-- Kanban columns (3 columns with cards) -->
  <!-- Column 1 -->
  <rect x="4" y="8" width="6" height="2.5" rx="1" fill="white" opacity="0.9"/>
  <rect x="4" y="12" width="6" height="5" rx="1" fill="white" opacity="0.7"/>
  <rect x="4" y="19" width="6" height="5" rx="1" fill="white" opacity="0.5"/>
  
  <!-- Column 2 -->
  <rect x="13" y="8" width="6" height="2.5" rx="1" fill="white" opacity="0.9"/>
  <rect x="13" y="12" width="6" height="5" rx="1" fill="white" opacity="0.7"/>
  
  <!-- Column 3 -->
  <rect x="22" y="8" width="6" height="2.5" rx="1" fill="white" opacity="0.9"/>
  <rect x="22" y="12" width="6" height="5" rx="1" fill="white" opacity="0.7"/>
  <rect x="22" y="19" width="6" height="5" rx="1" fill="white" opacity="0.5"/>
</svg>